# Continuous integration for kotoji (backend Go module + frontend Next.js app).
#
# Runs on every push to main and on every pull request, proving a change keeps
# the stack green. Each job mirrors a command set already validated locally
# against a clean checkout; no command here is aspirational. The workflow is
# necorox-agnostic: it uses only ephemeral, throwaway values (a local Postgres
# service with a disposable password), no secrets, no real hostnames or IPs.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref, so a force
# push / rapid re-push does not pile up redundant CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # backend: build, vet, formatting, unit tests, and the conformance tag.
  # ---------------------------------------------------------------------------
  backend:
    name: backend (build / vet / fmt / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Read the exact toolchain (go 1.25.7) from backend/go.mod so CI never
          # drifts from the module's declared version. setup-go's module cache is
          # on by default and keyed off the go.sum in this directory.
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt check (fail on unformatted)
        # gofmt -l lists files that are NOT canonically formatted; any output is a
        # failure. The committed tree is gofmt-clean (verified locally), so this
        # stays green until someone commits unformatted Go.
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test (unit)
        run: go test ./...

      - name: go test -tags conformance
        run: go test -tags conformance ./...

  # ---------------------------------------------------------------------------
  # backend-integration: the -tags=integration suite against a live Postgres.
  # The migration round-trip test drives goose off the EMBEDDED migration FS, so
  # it is CWD-independent and runs cleanly via `go test -tags=integration ./...`
  # straight from backend/ (no working-directory gymnastics needed).
  # ---------------------------------------------------------------------------
  backend-integration:
    name: backend integration (postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          # Disposable, CI-only credentials. The DB name carries the _test suffix
          # the integration tests document. These never touch any real instance.
          POSTGRES_USER: kotoji
          POSTGRES_PASSWORD: kotoji
          POSTGRES_DB: kotoji_test
        ports:
          - 5432:5432
        # Gate the job's first DB call on Postgres actually being ready. The
        # citext + pgcrypto extensions the schema needs ship in postgres:18-alpine
        # and are CREATEd inside migration 0001 as the superuser, so no extra
        # provisioning step is required.
        options: >-
          --health-cmd "pg_isready -U kotoji -d kotoji_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The env var the tests read (os.Getenv("KOTOJI_DATABASE_URL")). sslmode is
      # disabled because the service container speaks plaintext on localhost.
      KOTOJI_DATABASE_URL: postgres://kotoji:kotoji@localhost:5432/kotoji_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go test -tags=integration
        run: go test -tags=integration ./...

  # ---------------------------------------------------------------------------
  # frontend: type-check, lint, and production build of the Next.js app.
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (tsc / lint / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 20 is the floor Next 16 requires (engines.node >=20.9.0). npm's
          # cache is keyed off the lockfile in this directory.
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc --noEmit
        # The repo invokes tsc directly (there is no typecheck npm script).
        run: npx tsc --noEmit

      - name: npm run lint
        run: npm run lint

      - name: npm run build
        run: npm run build

  # ---------------------------------------------------------------------------
  # drift: prove the committed generated artifacts are regenerable & current.
  # Three reproducible generators are gated here:
  #   1. frontend TS API types (openapi-typescript) from the OpenAPI spec
  #   2. backend sqlc accessors from queries + migration schema
  #   3. backend oapi-codegen Go DTOs (the Go openapi types are GENERATED, not
  #      hand-maintained: a pinned `go run ...oapi-codegen@v2.4.1` consumes a
  #      3.1->3.0 lowered copy of the spec produced by spec31to30.py). All three
  #      were verified to regenerate with an empty diff against the committed tree.
  # ---------------------------------------------------------------------------
  drift:
    name: drift (generated artifacts up to date)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python (for spec31to30.py)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML (spec31to30.py dependency)
        # spec31to30.py round-trips the spec through PyYAML to lower 3.1 nullable
        # unions for oapi-codegen. Pin it so the intermediate spec is stable.
        run: pip install "PyYAML==6.0.1"

      - name: Install sqlc
        # Same generator the repo uses (sqlc.yaml present). Pinned to the version
        # validated locally so regeneration is byte-reproducible.
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.31.1"

      - name: npm ci (frontend, for openapi-typescript)
        working-directory: frontend
        run: npm ci

      - name: Regenerate frontend TS API types
        # Exact invocation from `make gen-frontend` (run from frontend/).
        working-directory: frontend
        run: npx openapi-typescript ../docs/contracts/openapi.yaml -o src/lib/api/schema.d.ts

      - name: Regenerate backend sqlc accessors
        working-directory: backend
        run: sqlc generate

      - name: Regenerate backend oapi-codegen Go DTOs
        # Mirrors internal/openapi/gen.go's go:generate: lower the frozen 3.1 spec
        # to a 3.0 copy, then feed THAT to the pinned oapi-codegen. The source
        # docs/contracts/openapi.yaml is never modified.
        working-directory: backend
        run: |
          python3 internal/openapi/spec31to30.py ../docs/contracts/openapi.yaml /tmp/kotoji-openapi-30.yaml
          go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
            -config oapi-codegen.yaml /tmp/kotoji-openapi-30.yaml

      - name: Fail if any generated artifact is stale
        # A non-empty diff means a committed generated file is out of date with its
        # source. Regenerate locally (`make gen`) and commit to fix.
        run: |
          git diff --exit-code -- \
            frontend/src/lib/api/schema.d.ts \
            backend/internal/db/gen \
            backend/internal/openapi/types.gen.go

  # ---------------------------------------------------------------------------
  # e2e: the CORE USER JOURNEY in a real browser against a REAL composed stack.
  #
  # The base compose is proxy-less (separate :8080/:8081/:3000 ports, no single
  # origin), so the browser dashboard can't reach /api there. We bring the stack
  # up WITH the Traefik edge overlay in HTTP mode (KOTOJI_BASE_DOMAIN=
  # hosting.localhost) so the dashboard, /api, /auth and every served subdomain
  # share ONE origin reachable at http://hosting.localhost — exactly what the
  # Playwright suite expects (see e2e/README.md). Auth is password mode with NO
  # env admin password, so the suite drives the real first-run setup.
  #
  # The whole stack runs in Docker on the runner; the test env is the committed,
  # secret-free e2e/.env.e2e. Health-gating (curl /healthz via the edge) + a
  # single Playwright retry keep it non-flaky. The stack is ALWAYS torn down and
  # the HTML report is uploaded on failure for triage.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (core journey, composed stack)
    runs-on: ubuntu-latest
    # ubuntu-latest ships Docker + Compose v2 and curl; nothing extra to install
    # for the stack itself.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Map hosting.localhost to loopback
        # Chromium already resolves *.localhost to loopback (RFC 6761), but pin the
        # bare control host + the test handle host in /etc/hosts too so EVERY path
        # (curl health gate, any non-browser fetch) is deterministic and never
        # depends on the runner's wildcard-localhost behavior.
        run: |
          echo "127.0.0.1 hosting.localhost" | sudo tee -a /etc/hosts

      - name: Build + start the single-origin stack (edge overlay, HTTP)
        # Same invocation documented in e2e/README.md. --build ensures the images
        # match the checked-out source; the committed e2e/.env.e2e pins the test
        # env (development, HTTP edge, hosting.localhost, password mode, no env
        # admin password, insecure cookies, a throwaway secret key).
        run: |
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.edge.yml \
            --env-file e2e/.env.e2e \
            up -d --build

      - name: Wait for the stack to be healthy
        # Gate on the control plane's /healthz THROUGH the edge (Host header pins
        # the bare control host, since the runner has no hosting.localhost DNS).
        # Poll up to ~3 min; dump compose logs and fail loudly if it never comes
        # up so a boot error is visible in the job log rather than a mute timeout.
        run: |
          for i in $(seq 1 90); do
            if curl -fsS -H 'Host: hosting.localhost' http://127.0.0.1/healthz >/dev/null 2>&1; then
              echo "control plane healthy after ${i} attempt(s)"
              # Also confirm the frontend (UI) renders on the bare host.
              curl -fsS -H 'Host: hosting.localhost' http://127.0.0.1/ >/dev/null && \
                echo "frontend reachable on the single origin"
              exit 0
            fi
            sleep 2
          done
          echo "::error::stack did not become healthy in time"
          docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.edge.yml logs --no-color
          exit 1

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run the core-journey e2e suite
        working-directory: e2e
        env:
          # The single-origin host the suite drives. The runner's DNS resolves
          # *.localhost (and bare localhost) to loopback, and Chromium resolves
          # <handle>.hosting.localhost to loopback per RFC 6761 — so both the
          # control host and served subdomains reach the edge on :80.
          KOTOJI_E2E_BASE_URL: http://hosting.localhost
          KOTOJI_E2E_BASE_DOMAIN: hosting.localhost
          KOTOJI_E2E_ADMIN_PASSWORD: e2e-admin-pass-123
        run: npm test

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down the stack
        # Always: free the runner and ensure no state leaks between jobs/reruns.
        if: always()
        run: |
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.edge.yml \
            down -v
