<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="kotoji">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b5bf0"/>
      <stop offset=".55" stop-color="#7a5bf5"/>
      <stop offset="1" stop-color="#9b6bff"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffe6a8"/>
      <stop offset="1" stop-color="#ffcf6b"/>
    </radialGradient>
  </defs>

  <!-- brand tile -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>

  <!-- kotoji-tōrō: two splayed legs (the koto-bridge silhouette) -->
  <g stroke="#fff" stroke-width="2.2" stroke-linecap="round">
    <path d="M12.8 18.7 8.2 26.3"/>
    <path d="M19.2 18.7 23.8 26.3"/>
  </g>

  <!-- curved roof cap with upturned tips + finial -->
  <path d="M6 11.7 Q9 10.8 10.8 11.1 Q16 6.7 21.2 11.1 Q23 10.8 26 11.7 Q21 8.2 16 7 Q11 8.2 6 11.7 Z" fill="#fff"/>
  <circle cx="16" cy="5.4" r="1.5" fill="#fff"/>

  <!-- light chamber + lantern glow -->
  <rect x="10.7" y="12" width="10.6" height="7.4" rx="2.4" fill="#fff"/>
  <circle cx="16" cy="15.7" r="2.2" fill="url(#glow)"/>
</svg>
