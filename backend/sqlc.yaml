# sqlc configuration (v2). Generates type-safe pgx/v5 accessors from the
# hand-written SQL queries in internal/db/queries against the goose migration
# schema in internal/db/migrations. No .sql files exist yet — Phase 1 drops them
# in and runs `make gen`.
version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        sql_package: "pgx/v5"
        # Emit *T for nullable columns so handlers can distinguish NULL from zero.
        emit_pointers_for_null_types: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        # Map Postgres uuid to google/uuid.UUID (the canonical site/user ID type).
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
